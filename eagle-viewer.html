<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eagle Library Viewer</title>
<style>
:root{--bg:#1a1a2e;--bg-sidebar:#16213e;--bg-thumb:#0f3460;--border:#0f3460;--text:#e0e0e0;--text-dim:#666;--text-muted:#555;--text-faint:#444;--accent:#e94560;--accent-hover:#c7354d;--scrollbar:#0f3460;--input-bg:#1a1a2e;--btn-bg:#0f3460;--lb-bg:rgba(0,0,0,.92);--lb-text:#ccc;--lb-text-dim:#888;--lb-btn:rgba(255,255,255,.15);--lb-btn-hover:rgba(255,255,255,.3);--lb-input-bg:rgba(255,255,255,.1);--lb-input-border:rgba(255,255,255,.2);--lb-input-text:#fff;--lb-bar:rgba(0,0,0,.75);--lb-nav:rgba(255,255,255,.5);--lb-nav-hover:#fff;--lb-close:#fff;--lb-close-hover:#e94560}
[data-theme="light"]{--bg:#f0f0f0;--bg-sidebar:#fff;--bg-thumb:#e0e0e0;--border:#d0d0d0;--text:#222;--text-dim:#888;--text-muted:#999;--text-faint:#bbb;--accent:#e94560;--accent-hover:#d63851;--scrollbar:#c0c0c0;--input-bg:#fff;--btn-bg:#e0e0e0;--lb-bg:rgba(240,240,240,.95);--lb-text:#444;--lb-text-dim:#888;--lb-btn:rgba(0,0,0,.1);--lb-btn-hover:rgba(0,0,0,.18);--lb-input-bg:rgba(0,0,0,.06);--lb-input-border:rgba(0,0,0,.15);--lb-input-text:#222;--lb-bar:rgba(240,240,240,.88);--lb-nav:rgba(0,0,0,.4);--lb-nav-hover:#222;--lb-close:#555;--lb-close-hover:#e94560}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text)}

.welcome{display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;gap:16px}
.welcome h2{color:var(--accent);font-size:24px}
.welcome p{color:var(--text-dim);font-size:14px}
.welcome button{padding:12px 32px;font-size:16px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;transition:background .2s}
.welcome button:hover{background:var(--accent-hover)}
.welcome .hint{font-size:12px;color:var(--text-faint)}

.app{display:flex;height:100vh}

.sidebar{width:280px;min-width:280px;background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sidebar-header{padding:16px 20px;font-size:18px;font-weight:600;border-bottom:1px solid var(--border);color:var(--accent);cursor:pointer}
.sidebar-header:hover{opacity:.8}
.sidebar-search{padding:8px 12px;border-bottom:1px solid var(--border)}
.sidebar-search input{width:100%;padding:6px 10px;background:var(--input-bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px;outline:none}
.sidebar-search input:focus{border-color:var(--accent)}
.sidebar-tree{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-tree::-webkit-scrollbar{width:6px}
.sidebar-tree::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:3px}
.sidebar-footer{padding:8px 20px;font-size:12px;color:var(--text-muted);border-top:1px solid var(--border);text-align:right}

.tree-label{display:flex;align-items:center;padding:5px 12px;cursor:pointer;font-size:13px;white-space:nowrap;transition:background .15s}
.tree-label:hover{background:rgba(233,69,96,.15)}
.tree-label.active{background:rgba(233,69,96,.25);color:var(--accent)}
.tree-arrow{display:inline-block;width:16px;text-align:center;font-size:10px;color:var(--text-muted);transition:transform .2s;flex-shrink:0}
.tree-arrow.open{transform:rotate(90deg)}
.tree-arrow.leaf{visibility:hidden}
.tree-name{flex:1;overflow:hidden;text-overflow:ellipsis}
.tree-count{font-size:11px;color:var(--text-muted);margin-left:6px;flex-shrink:0}
.tree-children{display:none}
.tree-children.open{display:block}

.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.content-header{padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg-sidebar);display:flex;align-items:center;justify-content:space-between;min-height:52px}
.content-header h2{font-size:16px;font-weight:500}
.content-header .info{font-size:12px;color:var(--text-dim);margin-top:2px}
.content-header button{background:var(--btn-bg);border:none;color:var(--text);padding:4px 12px;border-radius:4px;cursor:pointer;font-size:12px}
.content-header button:hover{background:var(--accent)}

.grid{flex:1;overflow-y:auto;padding:16px;display:flex;flex-wrap:wrap;align-content:flex-start;gap:8px}
.grid::-webkit-scrollbar{width:8px}
.grid::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:4px}

.thumb{width:160px;height:160px;border-radius:6px;overflow:hidden;cursor:pointer;position:relative;background:var(--bg-thumb);transition:transform .15s,box-shadow .15s}
.thumb:hover{transform:scale(1.05);box-shadow:0 4px 20px rgba(233,69,96,.3)}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb .label{position:absolute;bottom:0;left:0;right:0;padding:4px 6px;background:linear-gradient(transparent,rgba(0,0,0,.8));font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none}

.empty-state{flex:1;display:flex;justify-content:center;align-items:center;color:var(--text-faint);font-size:16px}

.lightbox{display:none;position:fixed;inset:0;background:var(--lb-bg);z-index:1000;justify-content:center;align-items:center;flex-direction:column;overflow:hidden}
.lightbox.open{display:flex}
.lightbox.fit-width{justify-content:flex-start;overflow-y:auto;padding:56px 0 72px}
.lb-stage{position:relative;width:98vw;height:calc(100vh - 96px);flex-shrink:0}
.lb-img{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;height:100%;object-fit:contain;transition:opacity .5s ease}
.lb-img.no-transition{transition:none}
.lb-img.empty{display:none}
.lb-img.front{opacity:1;z-index:1}
.lb-img.back{opacity:0;z-index:0}
.lightbox.fit-width .lb-stage{width:min(95vw,1600px);height:auto;min-height:0;overflow:visible}
.lightbox.fit-width .lb-img{top:0;left:50%;transform:translateX(-50%);width:100%;height:auto;object-fit:contain}
.lightbox.fit-width .lb-img.back{width:0;height:0;overflow:hidden}
.lightbox-close{position:fixed;top:12px;right:16px;font-size:32px;color:var(--lb-close);cursor:pointer;z-index:1001;opacity:.6;line-height:1}
.lightbox-close:hover{opacity:1;color:var(--lb-close-hover)}
.lightbox-nav{position:fixed;top:50%;transform:translateY(-50%);font-size:56px;color:var(--lb-nav);cursor:pointer;z-index:1001;user-select:none;line-height:1}
.lightbox-nav:hover{color:var(--lb-nav-hover)}
.lb-prev{left:16px}
.lb-next{right:16px}
.lb-name{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);max-width:80vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px;color:var(--lb-text-dim);text-shadow:0 1px 4px rgba(0,0,0,.8);z-index:1001;pointer-events:none}
.lb-idx{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);font-size:13px;color:var(--lb-text-dim);text-shadow:0 1px 4px rgba(0,0,0,.8);z-index:1001;pointer-events:none}
.lightbox.fit-width .lb-name{position:static;transform:none;max-width:95vw;margin-top:12px;text-shadow:none}
.lightbox.fit-width .lb-idx{position:static;transform:none;margin-top:4px;text-shadow:none}
.lb-toolbar{position:fixed;top:12px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:1001}
.lb-toolbar button{background:var(--lb-btn);border:none;color:var(--lb-input-text);padding:6px 14px;border-radius:4px;cursor:pointer;font-size:13px;transition:background .15s}
.lb-toolbar button:hover{background:var(--lb-btn-hover)}
.lb-toolbar button.active{background:var(--accent)}
.header-btns{display:flex;align-items:center;gap:10px}
.header-btns select{padding:4px 8px;background:var(--input-bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px;outline:none;cursor:pointer}
.header-btns select:focus{border-color:var(--accent)}
.play-controls{display:flex;align-items:center;gap:6px}
.play-controls input[type=number]{width:48px;padding:3px 4px;background:var(--input-bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px;text-align:center}
.play-controls .unit{font-size:12px;color:var(--text-muted)}
.play-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 24px;background:var(--lb-bar);display:none;align-items:center;justify-content:center;gap:16px;z-index:1001;backdrop-filter:blur(4px)}
.play-bar.show{display:flex}
.play-bar button{background:var(--lb-btn);border:none;color:var(--lb-input-text);padding:6px 16px;border-radius:4px;cursor:pointer;font-size:13px;transition:background .15s}
.play-bar button:hover{background:var(--lb-btn-hover)}
.play-bar button.active{background:var(--accent)}
.play-bar label{font-size:13px;color:var(--lb-text-dim)}
.play-bar input[type=number]{width:50px;padding:4px 6px;background:var(--lb-input-bg);border:1px solid var(--lb-input-border);border-radius:4px;color:var(--lb-input-text);font-size:13px;text-align:center}
.play-bar .unit{font-size:13px;color:var(--lb-text-dim)}
</style>
</head>
<body>

<div id="welcome" class="welcome">
  <h2>Eagle Library Viewer</h2>
  <p>基于 File System Access API 实时读取本地 Eagle 图库</p>
  <button onclick="pickDir()">选择图库目录</button>
  <p class="hint">选择 .library 目录，需要 Chrome / Edge 浏览器</p>
</div>

<div id="app" class="app" style="display:none">
  <div class="sidebar">
    <div class="sidebar-header" onclick="pickDir()" title="点击切换图库目录">Eagle Library</div>
    <div class="sidebar-search"><input type="text" id="searchInput" placeholder="搜索文件夹..." oninput="renderTree()"></div>
    <div class="sidebar-tree" id="tree"></div>
    <div class="sidebar-footer" id="footer"></div>
  </div>
  <div class="content">
    <div class="content-header">
      <div><h2 id="title">选择一个文件夹</h2><div class="info" id="info"></div></div>
      <div class="header-btns">
        <button id="btnTheme" onclick="toggleTheme()" title="切换主题">&#9788;</button>
        <select id="sortSelect" onchange="changeSort(this.value)">
          <option value="name">按文件名</option>
          <option value="date">按日期</option>
        </select>
        <div class="play-controls">
          <button id="btnPlay" onclick="startPlay()">▶ 播放</button>
          <input type="number" id="intervalInput" value="3" min="0.5" max="60" step="0.5" title="播放间隔(秒)">
          <span class="unit">秒</span>
        </div>
        <button id="btnAll" onclick="showAll()">全部图片</button>
      </div>
    </div>
    <div class="grid" id="grid" style="display:none"></div>
    <div class="empty-state" id="emptyState">点击左侧文件夹开始浏览</div>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <div class="lightbox-close" onclick="closeLB()">&times;</div>
  <div class="lb-toolbar">
    <button id="lbZoomBtn" onclick="toggleLBZoom()" title="切换图片缩放方式">适宽</button>
  </div>
  <div class="lightbox-nav lb-prev" onclick="navLB(-1)">&#8249;</div>
  <div class="lightbox-nav lb-next" onclick="navLB(1)">&#8250;</div>
  <div class="lb-stage">
    <img id="lbImgA" class="lb-img front" src="">
    <img id="lbImgB" class="lb-img back" src="">
  </div>
  <div class="lb-name" id="lbName"></div>
  <div class="lb-idx" id="lbIdx"></div>
  <div class="play-bar" id="playBar">
    <button id="lbPlayBtn" onclick="togglePlay()">⏸ 暂停</button>
    <label>间隔</label>
    <input type="number" id="lbInterval" value="3" min="0.5" max="60" step="0.5" onchange="updateInterval(this.value)">
    <span class="unit">秒</span>
  </div>
</div>

<script>
// ---- IndexedDB 持久化目录句柄 ----
const IDB = {
  _db: null,
  async db() {
    if (this._db) return this._db;
    return new Promise((ok, no) => {
      const r = indexedDB.open('eagle-viewer', 1);
      r.onupgradeneeded = () => r.result.createObjectStore('s');
      r.onsuccess = () => { this._db = r.result; ok(this._db); };
      r.onerror = no;
    });
  },
  async get(k) { return new Promise(async ok => { const r = (await this.db()).transaction('s').objectStore('s').get(k); r.onsuccess = () => ok(r.result); r.onerror = () => ok(null); }); },
  async put(k, v) { return new Promise(async ok => { const r = (await this.db()).transaction('s','readwrite').objectStore('s').put(v,k); r.oncomplete = ok; r.onerror = ok; }); }
};

// ---- 状态 ----
let dirH = null, imagesDirH = null;
let folderTree = [], folderMap = {}, folderImgMap = {}, folderCounts = {}, totalCount = 0;
let activeId = null, curImgs = [], lbPos = -1;
let sortBy = 'name'; // 'name' | 'date'
let thumbURLs = [], io = null, gridImgMap = new Map();
let lbUrls = [null, null], lbFront = 0; // 0=A front, 1=B front
let playTimer = null, isPlaying = false, playInterval = 3;
let lbFitWidth = localStorage.getItem('lbZoomMode') === 'fit-width';
let lbRenderSeq = 0, gridRenderSeq = 0, preloadSeq = 0;
const UNCATEGORIZED_ID = '__uncategorized__';
const UNCATEGORIZED_NODE = { id: UNCATEGORIZED_ID, name: '未分类', children: [], path: '未分类' };
const INDEX_CONCURRENCY = 32;
const nameCollator = new Intl.Collator('zh');

const imagesDir = async () => {
  if (!imagesDirH) imagesDirH = await dirH.getDirectoryHandle('images');
  return imagesDirH;
};

const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const imgResolution = d => d.width && d.height ? `${d.width}×${d.height}` : '';
const imgDisplayName = d => {
  const res = imgResolution(d);
  return res ? `${d.name} · ${res}` : d.name;
};

// ---- 主题 ----
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('theme', t);
  document.getElementById('btnTheme').innerHTML = t === 'light' ? '&#9790;' : '&#9788;';
}
function toggleTheme() {
  applyTheme(document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
}
applyTheme(localStorage.getItem('theme') || 'dark');

// ---- 初始化 ----
window.addEventListener('load', async () => {
  if (!window.showDirectoryPicker) {
    document.getElementById('welcome').innerHTML = '<h2>浏览器不支持</h2><p style="color:#999">请使用 Chrome 或 Edge 浏览器打开此页面</p>';
    return;
  }
  const saved = await IDB.get('dir');
  if (saved) {
    try {
      if (await saved.queryPermission({ mode: 'read' }) === 'granted') {
        dirH = saved;
        loadLibrary();
        return;
      }
    } catch {}
  }
});

async function pickDir() {
  try { dirH = await window.showDirectoryPicker({ mode: 'read' }); } catch { return; }
  IDB.put('dir', dirH);
  loadLibrary();
}

async function loadLibrary() {
  // 1. 读取元数据
  try {
    const fh = await dirH.getFileHandle('metadata.json');
    const meta = JSON.parse(await (await fh.getFile()).text());
    folderTree = meta.folders || [];
  } catch (e) {
    document.querySelector('#welcome p').textContent = '无法读取 metadata.json: ' + e.message;
    return;
  }

  // 2. 初始化文件夹结构
  folderMap = {}; folderImgMap = {}; folderCounts = {}; totalCount = 0;
  activeId = null; imagesDirH = null;
  idxFolders(folderTree, '');
  folderMap[UNCATEGORIZED_ID] = UNCATEGORIZED_NODE;
  folderImgMap[UNCATEGORIZED_ID] = [];

  // 3. 同步切换 UI（关键：所有 DOM 更新在一个同步块内完成）
  renderTree();
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.querySelector('.sidebar-header').textContent = dirH.name || 'Eagle Library';
  document.getElementById('title').textContent = '选择一个文件夹';
  document.getElementById('info').textContent = '';
  document.getElementById('grid').style.display = 'none';
  document.getElementById('grid').innerHTML = '';
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('emptyState').textContent = '索引中...';

  // 4. 用 setTimeout 把索引推到下一个宏任务，确保浏览器先渲染 UI
  setTimeout(() => {
    indexImgs().catch(e => {
      document.getElementById('emptyState').textContent = '索引失败: ' + e.message;
    });
  }, 0);
}

function idxFolders(nodes, pp) {
  for (const n of nodes) {
    const path = pp ? pp + ' / ' + n.name : n.name;
    folderMap[n.id] = { ...n, path };
    folderImgMap[n.id] = [];
    if (n.children) idxFolders(n.children, path);
  }
}

async function indexImgs() {
  const dir = await imagesDir();
  const pending = new Set();
  let c = 0, seen = 0;
  const addImg = ({ img, folders }) => {
    if (folders.length === 0) {
      folderImgMap[UNCATEGORIZED_ID].push(img);
    }
    for (const fid of folders) {
      if (folderImgMap[fid]) folderImgMap[fid].push(img);
      else folderImgMap[fid] = [img];
    }
    c++;
  };
  const readEntry = async entry => {
    try {
      const m = JSON.parse(await (await (await entry.getFileHandle('metadata.json')).getFile()).text());
      if (m.isDeleted === true) return;
      const width = m.width || m.resolutionWidth || 0;
      const height = m.height || m.resolutionHeight || 0;
      const img = { id: m.id, name: m.name || '', ext: m.ext || '', dn: entry.name, btime: m.btime || 0, width, height };
      addImg({ img, folders: Array.isArray(m.folders) ? m.folders : [] });
    } catch {}
  };
  for await (const entry of dir.values()) {
    if (!entry.name.endsWith('.info')) continue;
    seen++;
    const task = readEntry(entry).finally(() => pending.delete(task));
    pending.add(task);
    if (pending.size >= INDEX_CONCURRENCY) await Promise.race(pending);
    if (seen % 200 === 0) {
      document.getElementById('footer').textContent = `索引中... ${c}`;
      await new Promise(r => setTimeout(r, 0));
    }
  }
  await Promise.all(pending);
  totalCount = c;
  for (const fid in folderImgMap) folderImgMap[fid].sort((a, b) => nameCollator.compare(a.name, b.name));
  function calc(nodes) {
    for (const n of nodes) {
      let s = (folderImgMap[n.id] || []).length;
      if (n.children) { calc(n.children); for (const ch of n.children) s += folderCounts[ch.id] || 0; }
      folderCounts[n.id] = s;
    }
  }
  calc(folderTree);
  folderCounts[UNCATEGORIZED_ID] = folderImgMap[UNCATEGORIZED_ID].length;
  document.getElementById('footer').textContent = `${c} 张图片`;
  document.getElementById('emptyState').textContent = '点击左侧文件夹开始浏览';
  renderTree();
}

// ---- 树 ----
function treeNodes() {
  return folderCounts[UNCATEGORIZED_ID] > 0 ? [UNCATEGORIZED_NODE, ...folderTree] : folderTree;
}

function getAncestors(nodes, targetId) {
  // 返回 targetId 的所有祖先 ID 集合
  const result = new Set();
  function walk(ns, trail) {
    for (const n of ns) {
      if (n.id === targetId) { trail.forEach(id => result.add(id)); return true; }
      if (n.children && walk(n.children, [...trail, n.id])) return true;
    }
    return false;
  }
  walk(nodes, []);
  return result;
}

function renderTree() {
  const f = (document.getElementById('searchInput').value || '').toLowerCase();
  const nodes = treeNodes();
  const ancestors = activeId ? getAncestors(nodes, activeId) : new Set();
  document.getElementById('tree').innerHTML = treeHTML(nodes, 0, f, ancestors);
}

function treeHTML(nodes, d, f, ancestors) {
  let h = '';
  for (const n of nodes) {
    const cnt = folderCounts[n.id] || 0;
    if (f && !n.name.toLowerCase().includes(f)) continue;
    const has = n.children && n.children.length > 0;
    const act = n.id === activeId;
    const open = act || !!f || ancestors.has(n.id);
    h += `<div class="tree-label${act?' active':''}" data-id="${esc(String(n.id))}" style="padding-left:${12+d*16}px">`;
    h += `<span class="tree-arrow${has?(open?' open':''):' leaf'}">&#9654;</span>`;
    h += `<span class="tree-name">${esc(n.name)}</span><span class="tree-count">${cnt}</span></div>`;
    if (has) h += `<div class="tree-children${open?' open':''}">${treeHTML(n.children,d+1,f,ancestors)}</div>`;
  }
  return h;
}

// ---- 图片 ----
function sortImgs(arr) {
  return arr.sort((a, b) => {
    if (sortBy === 'date') return a.btime - b.btime;
    return nameCollator.compare(a.name, b.name);
  });
}

function collect(fid) {
  const m = new Map();
  (function add(id) {
    for (const i of (folderImgMap[id] || [])) m.set(i.id, i);
    const n = folderMap[id];
    if (n && n.children) for (const c of n.children) add(c.id);
  })(fid);
  return sortImgs([...m.values()]);
}

function collectAll() {
  const m = new Map();
  for (const imgs of Object.values(folderImgMap)) for (const i of imgs) m.set(i.id, i);
  return sortImgs([...m.values()]);
}

async function selectFolder(id) {
  activeId = id; renderTree();
  await showImgs(folderMap[id].path, collect(id));
}

function changeSort(type) {
  sortBy = type;
  if (activeId) selectFolder(activeId);
  else if (curImgs.length) showAll();
}

async function showAll() {
  activeId = null; renderTree();
  await showImgs('全部图片', collectAll());
}

async function showImgs(title, imgs) {
  lbRenderSeq++;
  gridRenderSeq++;
  preloadSeq++;
  // 清理旧缩略图：清空 src 后 revoke 以强制释放 blob URL（避免快速切换文件夹时内存泄漏）
  gridImgMap.forEach((url, el) => { try { el.removeAttribute('src'); URL.revokeObjectURL(url); } catch {} });
  gridImgMap.clear();
  thumbURLs = [];
  if (io) { io.disconnect(); io = null; }
  clearLBImages();
  // 中止正在进行的预加载并释放对应 blob URL
  clearPreload();
  curImgs = imgs;
  document.getElementById('title').textContent = title;
  document.getElementById('info').textContent = imgs.length + ' 张图片';
  document.getElementById('emptyState').style.display = 'none';
  const grid = document.getElementById('grid');
  grid.style.display = 'flex';
  grid.innerHTML = '';
  for (let i = 0; i < imgs.length; i++) {
    const d = document.createElement('div');
    d.className = 'thumb';
    d.innerHTML = `<img data-i="${i}" alt=""><div class="label">${esc(imgs[i].name)}</div>`;
    d.onclick = () => openLB(i);
    grid.appendChild(d);
  }
  io = new IntersectionObserver(es => {
    for (const e of es) {
      if (!e.isIntersecting) continue;
      loadThumb(e.target, curImgs[+e.target.dataset.i], gridRenderSeq);
      io.unobserve(e.target);
    }
  }, { root: grid, rootMargin: '300px' });
  grid.querySelectorAll('img[data-i]').forEach(el => io.observe(el));
}

async function loadThumb(el, d, seq) {
  let url = null;
  try {
    const dir = await imagesDir();
    const info = await dir.getDirectoryHandle(d.dn);
    let file;
    try { file = await (await info.getFileHandle(d.name + '_thumbnail.png')).getFile(); }
    catch { file = await (await info.getFileHandle(d.name + '.' + d.ext)).getFile(); }
    url = URL.createObjectURL(file);
    if (seq !== gridRenderSeq || !el.isConnected) { URL.revokeObjectURL(url); return; }
    thumbURLs.push(url);
    gridImgMap.set(el, url);
    el.src = url;
  } catch {
    if (url) URL.revokeObjectURL(url);
    if (seq === gridRenderSeq && el.isConnected) el.alt = '?';
  }
}

// ---- 灯箱 ----
function applyLBZoom() {
  const lb = document.getElementById('lightbox');
  const btn = document.getElementById('lbZoomBtn');
  lb.classList.toggle('fit-width', lbFitWidth);
  btn.textContent = lbFitWidth ? '适屏' : '适宽';
  btn.title = lbFitWidth ? '切换为完整适配屏幕' : '按可视宽度查看长图';
  btn.classList.toggle('active', lbFitWidth);
  updateLBStageSize(document.querySelector('.lb-img.front'));
}

function toggleLBZoom() {
  lbFitWidth = !lbFitWidth;
  localStorage.setItem('lbZoomMode', lbFitWidth ? 'fit-width' : 'fit-screen');
  applyLBZoom();
  document.getElementById('lightbox').scrollTop = 0;
}

function updateLBStageSize(img) {
  const stage = document.querySelector('.lb-stage');
  if (!lbFitWidth) {
    stage.style.height = '';
    return;
  }
  if (!img || !img.naturalWidth || !img.naturalHeight) return;
  const stageW = stage.clientWidth || Math.min(window.innerWidth * 0.95, 1600);
  stage.style.height = Math.max(1, Math.round(stageW * img.naturalHeight / img.naturalWidth)) + 'px';
}

function resetLBStageSize() {
  const stage = document.querySelector('.lb-stage');
  stage.style.height = lbFitWidth ? 'calc(100vh - 128px)' : '';
}

function settleLBLayer(img, cls, empty = false) {
  img.onload = null;
  img.onerror = null;
  img.className = `lb-img ${cls}${empty ? ' empty' : ''} no-transition`;
}

function clearLBImages() {
  lbFront = 0;
  lbUrls.forEach((u, i) => { if (u) { URL.revokeObjectURL(u); lbUrls[i] = null; } });
  document.getElementById('lbImgA').removeAttribute('src');
  document.getElementById('lbImgB').removeAttribute('src');
  document.getElementById('lbImgA').className = 'lb-img back empty no-transition';
  document.getElementById('lbImgB').className = 'lb-img back empty no-transition';
}

function animateLBSwap(frontEl, backEl, seq, nextFrontIdx, frontWasEmpty) {
  settleLBLayer(backEl, 'back');
  settleLBLayer(frontEl, 'front', frontWasEmpty);
  backEl.offsetWidth;
  backEl.classList.remove('no-transition');
  frontEl.classList.remove('no-transition');
  requestAnimationFrame(() => {
    if (seq !== lbRenderSeq) return;
    backEl.className = 'lb-img front';
    frontEl.className = `lb-img back${frontWasEmpty ? ' empty' : ''}`;
    lbFront = nextFrontIdx;
  });
}

async function openLB(i) {
  lbPos = i;
  document.getElementById('lightbox').classList.add('open');
  document.getElementById('lightbox').scrollTop = 0;
  applyLBZoom();
  document.addEventListener('keydown', lbKey);
  // 重置双图层
  clearLBImages();
  await updateLB();
}

async function loadImageData(d) {
  const dir = await imagesDir();
  const info = await dir.getDirectoryHandle(d.dn);
  const file = await (await info.getFileHandle(d.name + '.' + d.ext)).getFile();
  return URL.createObjectURL(file);
}

async function updateLB() {
  const seq = ++lbRenderSeq;
  const d = curImgs[lbPos];
  document.getElementById('lbName').textContent = imgDisplayName(d);
  document.getElementById('lbIdx').textContent = `${lbPos+1} / ${curImgs.length}`;
  if (lbFitWidth) document.getElementById('lightbox').scrollTop = 0;
  resetLBStageSize();

  const backIdx = 1 - lbFront;
  const frontEl = document.getElementById(lbFront === 0 ? 'lbImgA' : 'lbImgB');
  const backEl = document.getElementById(backIdx === 0 ? 'lbImgA' : 'lbImgB');
  const frontHasImage = !!lbUrls[lbFront];

  // 释放 back 旧 URL
  if (lbUrls[backIdx]) { URL.revokeObjectURL(lbUrls[backIdx]); lbUrls[backIdx] = null; }
  settleLBLayer(frontEl, 'front', !frontHasImage);
  settleLBLayer(backEl, 'back', true);
  backEl.removeAttribute('src');

  let url = null;
  try {
    url = await loadImageData(d);
    if (seq !== lbRenderSeq) { URL.revokeObjectURL(url); return; }
    lbUrls[backIdx] = url;
    const loadFallback = backEl.decode ? null : new Promise((resolve, reject) => {
      backEl.onload = resolve;
      backEl.onerror = reject;
    });
    backEl.src = url;
    if (backEl.decode) await backEl.decode();
    else await loadFallback;
    if (seq !== lbRenderSeq) { if (lbUrls[backIdx] === url) { URL.revokeObjectURL(url); lbUrls[backIdx] = null; } return; }
    if ((!d.width || !d.height) && backEl.naturalWidth && backEl.naturalHeight) {
      d.width = backEl.naturalWidth;
      d.height = backEl.naturalHeight;
      document.getElementById('lbName').textContent = imgDisplayName(d);
    }
    updateLBStageSize(backEl);
    animateLBSwap(frontEl, backEl, seq, backIdx, !frontHasImage);
    if (lbFitWidth) document.getElementById('lightbox').scrollTop = 0;
  } catch {
    if (url && lbUrls[backIdx] === url) { URL.revokeObjectURL(url); lbUrls[backIdx] = null; }
    if (seq === lbRenderSeq) resetLBStageSize();
  }

  // 播放时预加载下一张
  if (isPlaying && lbPos + 1 < curImgs.length) {
    preloadNext(lbPos + 1);
  }
}

let preloadEl = new Image();
let preloadUrl = null;
function clearPreload() {
  preloadEl.src = '';
  if (preloadUrl) {
    URL.revokeObjectURL(preloadUrl);
    preloadUrl = null;
  }
}
function preloadNext(idx) {
  const seq = ++preloadSeq;
  const d = curImgs[idx];
  imagesDir().then(dir => dir.getDirectoryHandle(d.dn)
    .then(info => info.getFileHandle(d.name + '.' + d.ext))
    .then(fh => fh.getFile())
    .then(file => {
      if (seq !== preloadSeq) return;
      clearPreload();
      preloadUrl = URL.createObjectURL(file);
      if (seq !== preloadSeq) { URL.revokeObjectURL(preloadUrl); preloadUrl = null; return; }
      preloadEl.src = preloadUrl;
    })
    .catch(() => {})
  );
}

function closeLB() {
  lbRenderSeq++;
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox').scrollTop = 0;
  document.removeEventListener('keydown', lbKey);
  stopPlay();
  preloadSeq++;
  clearPreload();
  clearLBImages();
}

function navLB(dir) {
  lbPos = (lbPos + dir + curImgs.length) % curImgs.length;
  updateLB();
  if (isPlaying) scheduleNext();
}

function lbKey(e) {
  if (e.key === 'Escape') closeLB();
  else if (e.key === 'ArrowLeft') navLB(-1);
  else if (e.key === 'ArrowRight') navLB(1);
  else if (e.key.toLowerCase() === 'w') toggleLBZoom();
}

// ---- 自动播放 ----
function startPlay() {
  if (curImgs.length === 0) return;
  playInterval = parseFloat(document.getElementById('intervalInput').value) || 3;
  document.getElementById('lbInterval').value = playInterval;
  isPlaying = true;
  document.getElementById('playBar').classList.add('show');
  document.getElementById('lbPlayBtn').textContent = '⏸ 暂停';
  document.getElementById('lbPlayBtn').classList.add('active');
  openLB(0);
  scheduleNext();
}

function stopPlay() {
  isPlaying = false;
  clearTimeout(playTimer);
  document.getElementById('playBar').classList.remove('show');
}

function togglePlay() {
  if (isPlaying) {
    isPlaying = false;
    clearTimeout(playTimer);
    document.getElementById('lbPlayBtn').textContent = '▶ 继续';
    document.getElementById('lbPlayBtn').classList.remove('active');
  } else {
    isPlaying = true;
    document.getElementById('lbPlayBtn').textContent = '⏸ 暂停';
    document.getElementById('lbPlayBtn').classList.add('active');
    scheduleNext();
  }
}

function scheduleNext() {
  clearTimeout(playTimer);
  playTimer = setTimeout(() => {
    if (!isPlaying) return;
    lbPos = (lbPos + 1) % curImgs.length;
    updateLB();
    scheduleNext();
  }, playInterval * 1000);
}

function updateInterval(val) {
  playInterval = Math.max(0.5, parseFloat(val) || 3);
  document.getElementById('intervalInput').value = playInterval;
  document.getElementById('lbInterval').value = playInterval;
  if (isPlaying) scheduleNext();
}

// ---- 事件 ----
document.getElementById('tree').addEventListener('click', e => {
  const l = e.target.closest('.tree-label');
  if (l && l.dataset.id) selectFolder(l.dataset.id);
});
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLB();
});
window.addEventListener('resize', () => {
  if (document.getElementById('lightbox').classList.contains('open')) {
    updateLBStageSize(document.querySelector('.lb-img.front'));
  }
});
applyLBZoom();
</script>
</body>
</html>
